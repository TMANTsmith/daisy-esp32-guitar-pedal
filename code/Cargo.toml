[package]
name = "code"
version = "0.1.0"
edition = "2021"

[dependencies]
cortex-m = "0.7.7"
daisy = { version = "0.11.0", features = ["seed_1_2"] } 
defmt = "1.0.1"
heapless = "0.9.2"
num_enum = "0.7.5"
rtic = "2.2.0"

[profile.release]
lto = true
codegen-units = 1
panic = "abort"

[target.aarch64-unknown-none]
rustflags = ["-C", "link-arg=-Tlinker.ld"]

[profile.dev]
panic = "abort"


