[package]
edition      = "2024"
name         = "code"
rust-version = "1.88"
version      = "0.1.0"

[[bin]]
name = "code"
path = "./src/bin/main.rs"


[dependencies]


esp-sync = { version = "0.1.0", features = ["esp32s3"] }
esp32s3 = "0.33.0"
esp-alloc = "0.9.0"
rtt-target = "0.6.1"
critical-section = "1.2.0"
static_cell = "2.1.1"
freeverb = { path = "/home/tucker/Projects/esp32-fx_v2/code/src/bin/audio_processing/freeverb/src/freeverb"}

[profile.dev]
# Rust debug is too slow.
# For debug builds always builds with some optimization
opt-level = "s"

[profile.release]
codegen-units    = 1     # LLVM can perform better optimizations using a single thread
debug            = 2
debug-assertions = false
incremental      = false
lto              = 'fat'
opt-level        = 's'
overflow-checks  = false

